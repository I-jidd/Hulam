<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Messages – HULAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body
    class="bg-gray-50/50 text-gray-900 selection:bg-[#9cd353]/30 flex flex-col min-h-screen overflow-x-hidden"
    data-page="messages"
  >
    <!-- ═══════════ HEADER ═══════════ -->
    <header
      id="main-header"
      class="fixed top-0 w-full z-50 transition-all duration-300 bg-transparent py-4"
    >
      <div class="max-w-7xl mx-auto px-6 flex items-center justify-between">
        <a href="index.html" class="flex items-center group">
          <div
            class="flex items-center gap-2 transform transition-transform group-hover:scale-105 duration-300"
          >
            <div class="flex -space-x-1.5">
              <div
                class="w-7 h-9 bg-[#1a5b6e] rounded-md transform -skew-x-12 shadow-sm"
              ></div>
              <div
                class="w-7 h-9 bg-[#9cd353] rounded-md transform -skew-x-12 opacity-90 mix-blend-multiply shadow-sm"
              ></div>
            </div>
            <span
              id="header-logo-text"
              class="text-2xl font-extrabold tracking-tighter text-white transition-colors duration-300"
              >HULAM</span
            >
          </div>
        </a>
        <nav
          id="header-nav"
          class="hidden md:flex items-center gap-10 font-medium text-sm tracking-wide transition-colors text-white/90"
        >
          <a href="index.html" class="hover:text-[#9cd353] transition-colors"
            >Home</a
          >
          <a href="browse.html" class="hover:text-[#9cd353] transition-colors"
            >Browse Items</a
          >
        </nav>
        <div id="auth-logged-out" class="flex items-center gap-4">
          <button
            onclick="toggleModal('login-modal', true)"
            id="header-btn-login"
            class="hidden sm:block px-6 py-2.5 rounded-full font-semibold transition-all active:scale-95 bg-white/20 text-white backdrop-blur-md hover:bg-white/30"
          >
            Log In
          </button>
          <button
            onclick="toggleModal('login-modal', true)"
            class="bg-[#9cd353] text-[#1a5b6e] px-7 py-2.5 rounded-full font-bold shadow-[0_4px_14px_0_rgba(156,211,83,0.39)] hover:bg-[#8bc34a] hover:-translate-y-0.5 transition-all duration-200 active:scale-95"
          >
            Sign Up
          </button>
        </div>
        <div id="auth-logged-in" class="hidden items-center gap-4">
          <div class="relative group cursor-pointer">
            <div
              class="w-10 h-10 rounded-full bg-gradient-to-br from-[#1a5b6e] to-[#25768e] flex items-center justify-center text-white border-2 border-white shadow-md"
            >
              <i data-lucide="user" class="w-5 h-5"></i>
            </div>
            <div
              class="absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-xl border border-gray-100 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 transform origin-top-right scale-95 group-hover:scale-100"
            >
              <div class="p-4 border-b border-gray-100">
                <p
                  class="font-bold text-gray-900 truncate"
                  id="user-display-name"
                >
                  User
                </p>
                <p
                  class="text-xs text-[#9cd353] font-bold flex items-center gap-1 mt-1"
                >
                  <i data-lucide="shield-check" class="w-3 h-3"></i> Scholar
                  Verified
                </p>
              </div>
              <div class="p-2">
                <a
                  href="dashboard.html"
                  class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-lg flex items-center gap-2"
                  ><i data-lucide="layout-dashboard" class="w-4 h-4"></i>
                  Dashboard</a
                >
                <a
                  href="messages.html"
                  class="w-full text-left px-4 py-2 text-sm text-[#1a5b6e] bg-[#1a5b6e]/5 rounded-lg flex items-center gap-2 font-bold"
                  ><i data-lucide="message-square" class="w-4 h-4"></i>
                  Messages</a
                >
                <div class="h-px bg-gray-100 my-1"></div>
                <button
                  onclick="handleLogout()"
                  class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 rounded-lg font-medium flex items-center gap-2"
                >
                  <i data-lucide="log-out" class="w-4 h-4"></i> Log Out
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- ═══════════ MESSAGES ═══════════ -->
    <main class="flex-grow pt-28 pb-10 px-6 w-full">
      <!-- Auth Gate -->
      <div id="auth-gate" class="hidden max-w-md mx-auto text-center py-32">
        <div
          class="w-20 h-20 bg-[#1a5b6e]/10 rounded-full flex items-center justify-center mx-auto mb-6"
        >
          <i data-lucide="lock" class="w-10 h-10 text-[#1a5b6e]"></i>
        </div>
        <h3 class="text-2xl font-bold text-gray-900 mb-2">
          Sign in to continue
        </h3>
        <p class="text-gray-500 mb-6">
          You need to be logged in to view your messages.
        </p>
        <button
          onclick="toggleModal('login-modal', true)"
          class="bg-[#1a5b6e] text-white px-8 py-3 rounded-full font-bold hover:bg-[#25768e] transition-colors"
        >
          Log In
        </button>
      </div>

      <!-- Messages UI -->
      <div
        id="messages-content"
        class="hidden max-w-6xl mx-auto bg-white rounded-[2rem] shadow-sm border border-gray-100 flex h-[75vh] overflow-hidden"
      >
        <!-- Contacts -->
        <div class="w-1/3 border-r border-gray-100 flex flex-col bg-white">
          <div class="p-6 border-b border-gray-100">
            <h2 class="text-2xl font-extrabold text-gray-900">Messages</h2>
          </div>
          <div class="overflow-y-auto flex-grow chat-scroll" id="contact-list">
            <!-- Injected by JS -->
          </div>
        </div>

        <!-- Chat -->
        <div class="w-2/3 flex flex-col bg-[#fcfaf7]">
          <!-- Chat Header -->
          <div
            class="p-5 bg-white border-b border-gray-100 flex items-center justify-between"
            id="chat-header"
          >
            <!-- Injected by JS -->
          </div>

          <!-- Messages -->
          <div
            class="flex-grow p-6 overflow-y-auto chat-scroll space-y-4"
            id="chat-messages"
          >
            <!-- Injected by JS -->
          </div>

          <!-- Input -->
          <div class="p-4 bg-white border-t border-gray-100">
            <div
              class="flex items-center gap-2 bg-gray-50 border border-gray-200 rounded-full p-2 focus-within:border-[#1a5b6e] focus-within:ring-2 ring-[#1a5b6e]/20 transition-all"
            >
              <input
                type="text"
                id="message-input"
                placeholder="Type your message…"
                class="flex-grow bg-transparent px-4 outline-none text-sm text-gray-700"
                onkeydown="handleMessageKey(event)"
              />
              <button
                onclick="sendMessage()"
                class="w-10 h-10 rounded-full bg-[#9cd353] text-[#1a5b6e] flex items-center justify-center hover:bg-[#8bc34a] transition-colors shrink-0"
              >
                <i data-lucide="send" class="w-4 h-4 ml-0.5"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Login Modal -->
    <div
      id="login-modal"
      class="fixed inset-0 bg-[#0f3440]/60 z-[100] flex items-center justify-center p-4 backdrop-blur-md transition-opacity duration-300 opacity-0 pointer-events-none hidden"
    >
      <div
        id="login-modal-content"
        class="bg-white rounded-[2rem] shadow-2xl w-full max-w-md overflow-hidden flex flex-col transform translate-y-8 transition-transform duration-500 ease-out p-8 text-center"
      >
        <div
          class="w-16 h-16 bg-[#1a5b6e]/10 rounded-2xl flex items-center justify-center mx-auto mb-6 text-[#1a5b6e]"
        >
          <i data-lucide="lock" class="w-8 h-8"></i>
        </div>
        <h3 class="text-3xl font-extrabold text-gray-900 tracking-tight mb-2">
          Welcome Back
        </h3>
        <p class="text-gray-500 mb-8">Sign in to view your messages.</p>
        <form onsubmit="handleLogin(event)" class="space-y-4 text-left">
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1"
              >Email</label
            >
            <input
              type="email"
              id="login-email"
              required
              placeholder="student@university.edu"
              class="w-full bg-gray-50 border border-gray-200 rounded-xl px-5 py-3 focus:bg-white focus:ring-4 focus:border-[#1a5b6e] outline-none font-medium"
            />
          </div>
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1"
              >Password</label
            >
            <input
              type="password"
              required
              placeholder="••••••••"
              class="w-full bg-gray-50 border border-gray-200 rounded-xl px-5 py-3 focus:bg-white focus:ring-4 focus:border-[#1a5b6e] outline-none font-medium"
            />
          </div>
          <button
            type="submit"
            class="w-full bg-[#1a5b6e] text-white py-4 mt-4 rounded-xl font-bold hover:-translate-y-0.5 transition-all"
          >
            Log In
          </button>
        </form>
        <button
          onclick="toggleModal('login-modal', false)"
          class="mt-6 text-gray-400 hover:text-gray-600 font-medium text-sm"
        >
          Close
        </button>
      </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/shared.js"></script>
    <script>
      // ─── MESSAGES PAGE LOGIC ───────────────────────────────────────────────

      const CONTACTS = [
        {
          id: "ms",
          initials: "MS",
          color: "bg-blue-100 text-blue-700",
          name: "Maria Santos",
          preview: "See you tomorrow at the campus gate!",
          item: "Sony A6400 Camera Rental",
        },
        {
          id: "jd",
          initials: "JD",
          color: "bg-orange-100 text-orange-700",
          name: "John Doe",
          preview: "Thanks for renting the drill.",
          item: "Power Drill Set Rental",
        },
      ];

      const THREADS = {
        ms: [
          {
            from: "them",
            text: "Hi! I just confirmed your rental request for the camera. When do you want to meet up?",
          },
          {
            from: "me",
            text: "Thanks! Are you free tomorrow around 10 AM at the main campus library?",
          },
          {
            from: "them",
            text: "Yes, 10 AM works. See you tomorrow at the campus gate! I'll have the camera in a black case.",
          },
        ],
        jd: [
          { from: "them", text: "Hey! The drill set is ready for pickup." },
          { from: "me", text: "Great, I'll swing by around 3 PM." },
          { from: "them", text: "Thanks for renting the drill." },
        ],
      };

      let activeContact = "ms";

      document.addEventListener("DOMContentLoaded", () => {
        const user = getUser();
        if (!user) {
          document.getElementById("auth-gate").classList.remove("hidden");
          return;
        }
        document.getElementById("messages-content").classList.remove("hidden");
        renderContactList();
        openThread("ms");
      });

      function renderContactList() {
        const list = document.getElementById("contact-list");
        list.innerHTML = CONTACTS.map(
          (c) => `
        <div onclick="openThread('${c.id}')"
          class="p-4 border-b border-gray-50 cursor-pointer flex items-center gap-4 transition-colors ${activeContact === c.id ? "bg-[#1a5b6e]/5" : "hover:bg-gray-50"}">
          <div class="w-12 h-12 rounded-full ${c.color} flex items-center justify-center font-bold shrink-0">${c.initials}</div>
          <div class="overflow-hidden">
            <h4 class="font-bold text-gray-900 truncate">${c.name}</h4>
            <p class="text-sm ${activeContact === c.id ? "text-gray-600" : "text-gray-400"} truncate">${c.preview}</p>
          </div>
        </div>`,
        ).join("");
      }

      function openThread(contactId) {
        activeContact = contactId;
        renderContactList();

        const contact = CONTACTS.find((c) => c.id === contactId);
        const thread = THREADS[contactId] || [];

        // Header
        document.getElementById("chat-header").innerHTML = `
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-full ${contact.color} flex items-center justify-center font-bold">${contact.initials}</div>
          <div>
            <h4 class="font-bold text-gray-900">${contact.name}</h4>
            <p class="text-xs text-gray-500">${contact.item}</p>
          </div>
        </div>`;

        // Messages
        const chatEl = document.getElementById("chat-messages");
        chatEl.innerHTML = thread
          .map((msg) =>
            msg.from === "me"
              ? `<div class="flex justify-end">
             <div class="bg-[#1a5b6e] text-white px-5 py-3 rounded-2xl rounded-tr-none shadow-sm max-w-[70%]">${msg.text}</div>
           </div>`
              : `<div class="flex justify-start">
             <div class="bg-white border border-gray-100 text-gray-700 px-5 py-3 rounded-2xl rounded-tl-none shadow-sm max-w-[70%]">${msg.text}</div>
           </div>`,
          )
          .join("");

        chatEl.scrollTop = chatEl.scrollHeight;
        lucide.createIcons();
      }

      function sendMessage() {
        const input = document.getElementById("message-input");
        const text = input.value.trim();
        if (!text) return;

        THREADS[activeContact] = THREADS[activeContact] || [];
        THREADS[activeContact].push({ from: "me", text });
        input.value = "";

        const chatEl = document.getElementById("chat-messages");
        const bubble = document.createElement("div");
        bubble.className = "flex justify-end";
        bubble.innerHTML = `<div class="bg-[#1a5b6e] text-white px-5 py-3 rounded-2xl rounded-tr-none shadow-sm max-w-[70%]">${text}</div>`;
        chatEl.appendChild(bubble);
        chatEl.scrollTop = chatEl.scrollHeight;

        // Update contact preview
        const contact = CONTACTS.find((c) => c.id === activeContact);
        if (contact) contact.preview = text;
        renderContactList();
      }

      function handleMessageKey(e) {
        if (e.key === "Enter") sendMessage();
      }
    </script>
  </body>
</html>
